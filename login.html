<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Klien | PT. Solusi Industri Manufaktur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        
        <div class="auth-header">
            <h2>PT. SOLUSI INDUSTRI</h2>
            <p>Portal Mitra & Procurement B2B</p>
        </div>

        <div id="login-box">
            <h3>Masuk ke Akun Anda</h3>
            <form id="form-login">
                <div class="form-group">
                    <label for="login-email">Email Bisnis:</label>
                    <input type="email" id="login-email" required placeholder="nama@perusahaan.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Kata Sandi:</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-auth">Masuk Portal</button>
            </form>
            <p class="auth-switch">Belum jadi mitra? <a href="#" onclick="switchForm('register')">Daftar Akun Baru</a></p>
        </div>

        <div id="register-box" style="display: none;">
            <h3>Pendaftaran Mitra Baru</h3>
            <form id="form-register">
                <div class="form-group">
                    <label for="reg-perusahaan">Nama Perusahaan:</label>
                    <input type="text" id="reg-perusahaan" required placeholder="PT. Maju Bersama">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Bisnis:</label>
                    <input type="email" id="reg-email" required placeholder="procurement@perusahaan.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Kata Sandi Baru:</label>
                    <input type="password" id="reg-password" required placeholder="Minimal 6 karakter">
                </div>
                <button type="submit" class="btn-auth">Ajukan Kemitraan</button>
            </form>
            <p class="auth-switch">Sudah punya akun? <a href="#" onclick="switchForm('login')">Silakan Masuk</a></p>
        </div>

        <div class="auth-footer">
            <a href="index.html">&larr; Kembali ke Halaman Utama</a>
        </div>
    </div>

    <script type="module">
        // 1. Import library Firebase langsung lewat tautan CDN resmi Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 2. Menggunakan Kunci Akses API Asli Anda
        const firebaseConfig = {
            apiKey: "AIzaSyC6MwXI4wtfyiAAHn2KJxG2UAFNacRa51U",
            authDomain: "web-industri-b2b.firebaseapp.com",
            projectId: "web-industri-b2b",
            storageBucket: "web-industri-b2b.firebasestorage.app",
            messagingSenderId: "682973880679",
            appId: "1:682973880679:web:ccfc7f412a61eb8869cfc2"
        };

        // Inisialisasi Aplikasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Menjadikan fungsi switchForm global agar bisa dipanggil oleh atribut onclick pada HTML
        window.switchForm = function(type) {
            const loginBox = document.getElementById('login-box');
            const registerBox = document.getElementById('register-box');
            
            if (type === 'register') {
                loginBox.style.display = 'none';
                registerBox.style.display = 'block';
            } else {
                loginBox.style.display = 'block';
                registerBox.style.display = 'none';
            }
        }

        // ==========================================
        // EVENT: REGISTRASI (CREATE USER)
        // ==========================================
        document.getElementById('form-register').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const namaPerusahaan = document.getElementById('reg-perusahaan').value;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert(`Registrasi Berhasil!\nSelamat bergabung, ${namaPerusahaan}. Silakan masuk menggunakan akun bisnis Anda.`);
                    window.switchForm('login');
                })
                .catch((error) => {
                    alert("Registrasi Gagal: " + error.message);
                });
        });

        // ==========================================
        // EVENT: MASUK (SIGN IN USER)
        // ==========================================
        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Akses Diterima! Selamat datang di Portal Utama Procurement.");
                    window.location.href = "index.html"; 
                })
                .catch((error) => {
                    alert("Akses Ditolak: Periksa kembali email dan kata sandi Anda!");
                });
        });
    </script>
</body>
</html>
